<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestor de Gastos</title>
    <link rel="stylesheet" href="Layout.css">
    <link href="font-family.css" rel="stylesheet">
</head>

<body>
    <div class="container">

        <h1>Gestão de Gastos</h1>
        <button id="toggleTema" class="botao-tema">🌙</button>
        <div class="layout-principal">
            <div class="conteudo-esquerda">
                <section class="filtro-section">
                    <h2>Filtrar por mês</h2>
                    <div class="campo">
                        <label for="filtroMes">Mês</label>
                        <input type="month" id="filtroMes">
                    </div>
                </section>

                <section class="receita-section">
                    <h2>Receita do mês</h2>
                    <div class="campo">
                        <label for="receita">Valor recebido</label>
                        <input type="number" id="receita" step="0.01" placeholder="Ex: 3000.00">
                    </div>
                </section>

                <section class="form-section">
                    <h2>Adicionar Gasto</h2>

                    <form id="gastoForm">
                        <div class="campo">
                            <label for="descricao">Descrição</label>
                            <input type="text" id="descricao" required>
                        </div>

                        <div class="campo">
                            <label for="valor">Valor</label>
                            <input type="number" id="valor" step="0.01" required>
                        </div>

                        <div class="campo">
                            <label for="categoria">Categoria</label>
                            <select id="categoria" required>
                                <option value="">Selecione a categoria</option>
                                <option value="Alimentação">Alimentação</option>
                                <option value="Ração">Ração</option>
                                <option value="Contas Fixas">Contas Fixas</option>
                                <option value="Saúde">Saúde</option>
                                <option value="Lazer">Lazer</option>
                                <option value="Investimentos">Investimentos</option>
                            </select>
                        </div>

                        <div class="campo">
                            <label for="data">Data</label>
                            <input type="date" id="data" required>
                        </div>

                        <button type="submit">Adicionar Gasto</button>
                    </form>
                </section>

                <section class="resumo-section">
                    <h2>Resumo</h2>

                    <div class="resumo-cards">
                        <div class="card-resumo">
                            <p>Receita</p>
                            <span id="receitaValor">R$ 0,00</span>
                        </div>

                        <div class="card-resumo">
                            <p>Total gasto</p>
                            <span id="totalGasto">R$ 0,00</span>
                        </div>


                        <div class="card-resumo">
                            <p>Saldo Final</p>
                            <span id="saldo">R$ 0,00</span>
                        </div>
                    </div>

                    <h3>Gastos por categoria</h3>
                    <ul id="listaCategorias"></ul>
                </section>

                <section class="lista-section">
                    <h2>Lista de gastos</h2>
                    <ul id="listaGastos"></ul>
                </section>
            </div>

            <div class="conteudo-direita">
                <section class="grafico-section">
                    <h2>Gráficos</h2>

                    <h3>Receita x gasto</h3>
                    <div class="grafico-area">
                        <canvas id="graficoResumo"></canvas>
                    </div>

                    <h3>Gastos por categoria</h3>
                    <div class="grafico-area">
                        <canvas id="graficoCategorias"></canvas>
                    </div>
                </section>
            </div>
        </div>
    </div>
    <script src="Graficos.js"></script>
    <script src="pizza%.js"></script>
    <script src="funcionalidade.js"></script>
</body>

</html>
